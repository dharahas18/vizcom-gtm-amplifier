<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, system-ui, sans-serif">
  <title>Three growth problems Vizcom could solve — ranked by leverage</title>
  <desc>Side-by-side comparison: conversion velocity (winner), content + community velocity (high leverage), and lead generation (loses on this stage and customer profile).</desc>
  <style>
    .h { font-size: 14px; font-weight: 700; fill: #1d1d1f; }
    .l { font-size: 12px; fill: #1d1d1f; }
    .s { font-size: 11px; fill: #6e6e73; }
    .num { font-size: 24px; font-weight: 700; }
  </style>
  <rect width="800" height="380" fill="#fafafa"/>
  <text x="400" y="32" font-size="18" font-weight="700" fill="#1d1d1f" text-anchor="middle">Three problems Vizcom could solve — by leverage</text>
  <text x="400" y="52" class="s" font-style="italic" text-anchor="middle">An agent can amplify one. Picking the wrong one wastes the cycle.</text>

  <!-- Problem 1: Conversion (winner) -->
  <rect x="40" y="80" width="230" height="260" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="155" y="110" class="num" fill="#388e3c" text-anchor="middle">⭐ #1</text>
  <text x="155" y="138" class="h" text-anchor="middle">Conversion velocity</text>
  <text x="155" y="156" class="s" text-anchor="middle">free → Pro → enterprise</text>
  <line x1="60" y1="172" x2="250" y2="172" stroke="#388e3c" stroke-width="1"/>
  <text x="155" y="192" class="l" text-anchor="middle" font-weight="600">3–8x ARR opportunity</text>
  <text x="60" y="214" class="s">• 700K users already in funnel</text>
  <text x="60" y="232" class="s">• ~1% conversion vs. 3–5% good</text>
  <text x="60" y="250" class="s">• Bottleneck: free users don't</text>
  <text x="60" y="266" class="s">  see reasons to upgrade</text>
  <text x="60" y="290" class="l" text-anchor="start" font-weight="600">Where amplifier wins:</text>
  <text x="60" y="308" class="s">Customer wins + designer features</text>
  <text x="60" y="324" class="s">create the social proof Pro users need.</text>

  <!-- Problem 2: Content velocity -->
  <rect x="285" y="80" width="230" height="260" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
  <text x="400" y="110" class="num" fill="#1976d2" text-anchor="middle">#2</text>
  <text x="400" y="138" class="h" text-anchor="middle">Content + community</text>
  <text x="400" y="156" class="s" text-anchor="middle">velocity (compounding)</text>
  <line x1="305" y1="172" x2="495" y2="172" stroke="#1976d2" stroke-width="1"/>
  <text x="400" y="192" class="l" text-anchor="middle" font-weight="600">Compounding leverage</text>
  <text x="305" y="214" class="s">• DesignersPen 80K + 150 customers</text>
  <text x="305" y="232" class="s">  + 700K designers — assets exist</text>
  <text x="305" y="250" class="s">• Production is founder-bottlenecked</text>
  <text x="305" y="266" class="s">• Feeds SEO + AEO + brand density</text>
  <text x="305" y="290" class="l" text-anchor="start" font-weight="600">Where amplifier wins:</text>
  <text x="305" y="308" class="s">Each signal becomes 5 channel outputs</text>
  <text x="305" y="324" class="s">— turns 1 hr/week into 5 surfaces.</text>

  <!-- Problem 3: Lead gen (loser) -->
  <rect x="530" y="80" width="230" height="260" fill="#fafafa" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="5 5" rx="6"/>
  <text x="645" y="110" class="num" fill="#9e9e9e" text-anchor="middle">✗ #3</text>
  <text x="645" y="138" class="h" text-anchor="middle" fill="#6e6e73">Lead generation</text>
  <text x="645" y="156" class="s" text-anchor="middle">cold outbound to designers</text>
  <line x1="550" y1="172" x2="740" y2="172" stroke="#9e9e9e" stroke-width="1"/>
  <text x="645" y="192" class="l" text-anchor="middle" font-weight="600" fill="#6e6e73">Solves wrong problem</text>
  <text x="550" y="214" class="s">• Already 700K leads in funnel</text>
  <text x="550" y="232" class="s">• Cold outbound: 1–3% reply rate</text>
  <text x="550" y="250" class="s">• Designers discover via peers</text>
  <text x="550" y="266" class="s">  / community, not cold email</text>
  <text x="550" y="290" class="l" text-anchor="start" font-weight="600" fill="#6e6e73">Why an amplifier loses:</text>
  <text x="550" y="308" class="s">Outbound is linear. Content + community</text>
  <text x="550" y="324" class="s">compounds. Figma waited until year 4.</text>
</svg>
